name: Daily release

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Compile
        run: uv run --python 3.12 python -m compileall src tests scripts
      - name: Test
        run: uv run --python 3.12 python -m unittest discover -s tests
      - name: Lint
        run: uv run --python 3.12 python scripts/lint.py
      - name: Resolve Azure Service Tags URL
        id: azure
        shell: bash
        run: |
          set -euo pipefail
          url="$(curl -fsSL 'https://www.microsoft.com/en-us/download/confirmation.aspx?id=56519' \
            | grep -Eo 'https://download\.microsoft\.com/download/[^"]+ServiceTags_Public_[0-9]+\.json' \
            | head -n 1)"
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Download previous daily feed
        shell: bash
        run: |
          curl -fsSL \
            -o previous-cloud-egress-ip-ranges.json \
            'https://github.com/ipanalytics/cloud-egress-ip-ranges/releases/download/daily/cloud-egress-ip-ranges.json' \
            || rm -f previous-cloud-egress-ip-ranges.json
      - name: Build live artifacts
        run: uv run --python 3.12 python scripts/build.py --azure-service-tags-url '${{ steps.azure.outputs.url }}' --previous-feed previous-cloud-egress-ip-ranges.json
      - name: Package classified lists
        run: |
          tar -czf cloud-egress-ip-ranges-classified.tar.gz -C dist classified
          tar -czf cloud-egress-ip-ranges-integrations.tar.gz -C dist integrations
          cp dist/cloud-egress-ip-ranges.json cloud-egress-ip-ranges.json
          cp dist/cloud-egress-ip-ranges.csv cloud-egress-ip-ranges.csv
          cp dist/cloud-egress-ip-ranges.jsonl cloud-egress-ip-ranges.jsonl
          cp dist/cloud-egress-ip-ranges.parquet cloud-egress-ip-ranges.parquet
          cp dist/cloud-egress-ip-ranges.sqlite cloud-egress-ip-ranges.sqlite
          cp dist/cloud-egress-ip-ranges.duckdb cloud-egress-ip-ranges.duckdb
          cp dist/manifest.json manifest.json
          cp dist/latest.json latest.json
          cp dist/diff/latest.json diff-latest.json
          cp dist/sources.md sources.md
          cp dist/providers.yaml providers.yaml
          cp dist/egress-capabilities.json egress-capabilities.json
          cp dist/provider-catalog.json provider-catalog.json
          cp dist/provider-catalog.md provider-catalog.md
          mkdir -p site/data
          cp dist/latest.json site/data/latest.json
          cp dist/provider-catalog.json site/data/provider-catalog.json
          cp dist/sources.md site/data/sources.md
      - name: Publish daily release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily
          name: Daily cloud egress IP ranges
          make_latest: true
          body_path: sources.md
          files: |
            cloud-egress-ip-ranges.json
            cloud-egress-ip-ranges.csv
            cloud-egress-ip-ranges.jsonl
            cloud-egress-ip-ranges.parquet
            cloud-egress-ip-ranges.sqlite
            cloud-egress-ip-ranges.duckdb
            manifest.json
            latest.json
            diff-latest.json
            sources.md
            providers.yaml
            egress-capabilities.json
            provider-catalog.json
            provider-catalog.md
            cloud-egress-ip-ranges-classified.tar.gz
            cloud-egress-ip-ranges-integrations.tar.gz
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
