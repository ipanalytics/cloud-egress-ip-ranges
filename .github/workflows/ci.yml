name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Compile
        run: uv run --python 3.12 python -m compileall src tests scripts
      - name: Test
        run: uv run --python 3.12 python -m unittest discover -s tests
      - name: Lint
        run: uv run --python 3.12 python scripts/lint.py
      - name: Offline build smoke
        run: uv run --python 3.12 python scripts/build.py --offline-fixtures

